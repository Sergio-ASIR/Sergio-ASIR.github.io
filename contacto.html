<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean & Go - Lavandería autoservicio</title>
    <!-- Fuente Open Sans -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Fuente Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Enlace al CSS -->
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <header>
        <h1>Clean & Go lavandería autoservicio</h1>

        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="info.html">Información</a></li>
                 <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>

    </header>

    <main>
    <form>
        <label for="nombre">Nombre</label>
        <input type="text" id="nombre" name="nombre" required>

        <label for="apellido">Apellidos</label>
        <input type="text" id="apellido" name="apellido" required>

        <label for="email">E-Mail</label>
        <input type="email" id="email" name="email" required>

        <label for="tipo">Tipo de consulta:</label>
        <select id="tipo" name="tipo" required>
            <option value="">-- Selecciona una opción --</option>
            <option value="lavado">Información sobre lavado</option>
            <option value="secado">Información sobre secado</option>
            <option value="general">Consulta general</option>
            <option value="incidencia">Incidencia</option>
        </select>

        <label for="mensaje">Asunto del mensaje</label>
        <textarea id="mensaje" name="mensaje" rows="4" placeholder="Escriba su mensaje aquí..." required></textarea>

        <label>Prioridad:</label>
        <label>
        <input type="radio" name="prioridad" value="normal" checked> Normal
        </label>
        <label>
        <input type="radio" name="prioridad" value="urgente"> Urgente
        </label>

        <label>
        <input type="checkbox" name="privacidad" required>
        Acepto la política de privacidad
        </label>

        <button type="submit">Enviar</button>
    </form>
    </main>
    <footer>
        <p>Clean & Go Autoservicio</p>
        <p>Avenida Las Águilas 61, 28044, Madrid</p>
        <p>clean-and-go@gmail.com</p>
        <p>652 207 813</p>
    </footer>
</body>
</html>
